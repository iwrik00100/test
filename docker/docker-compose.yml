version: "3.9"

services:

  # ── Main app ────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: netops-cockpit
    ports:
      - "8080:80"
    volumes:
      # Live-reload src and domains without rebuilding
      - ./src:/usr/share/nginx/html/src:ro
      - ./domains:/usr/share/nginx/html/domains:ro
      - ./schema:/usr/share/nginx/html/schema:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/src/"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - "com.netops.service=app"
      - "com.netops.version=2.0"

  # ── Grafana (optional — run with: docker compose --profile monitoring up) ──
  grafana:
    image: grafana/grafana:10.4.0
    container_name: netops-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=netops
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    restart: unless-stopped
    profiles:
      - monitoring
    labels:
      - "com.netops.service=grafana"

volumes:
  grafana-data:
    name: netops-grafana-data
