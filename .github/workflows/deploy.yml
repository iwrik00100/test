name: CD — Deploy to GitHub Pages

on:
  push:
    branches: [main, ver1.8]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:

  build:
    name: Build Site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Setup Pages
        if: github.ref_name == 'main'
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v4

      - name: Validate JSON files
        run: |
          python3 << 'EOF'
          import json, os, sys
          errors = []
          for root, dirs, files in os.walk('domains'):
              for f in files:
                  if f.endswith('.json'):
                      path = os.path.join(root, f)
                      try:
                          json.load(open(path, encoding='utf-8'))
                      except json.JSONDecodeError as e:
                          errors.append(f'{path}: {e}')
          if errors:
              print('JSON validation failed:')
              for e in errors: print(e)
              sys.exit(1)
          total = sum(1 for r,d,fs in os.walk('domains') for f in fs if f.endswith('.json'))
          print(f'All {total} JSON files valid')
          EOF

      - name: Build site artifact
        run: |
          mkdir -p _site
          cp -r src/     _site/src/
          cp -r domains/ _site/domains/
          cp -r schema/  _site/schema/
          printf '<html><head><meta http-equiv="refresh" content="0;url=src/"></head></html>' \
            > _site/index.html

      - name: Upload Pages artifact
        if: github.ref_name == 'main'
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref_name == 'main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

      - name: Post deployment summary
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** $(date -u)" >> $GITHUB_STEP_SUMMARY
