name: CI — Validate & Quality Gates

on:
  pull_request:
    branches: [main, ver1.8]
  push:
    branches: [main, ver1.8]

jobs:

  # ── JSON Syntax Validation ──────────────────────────────────────
  validate-json:
    name: Validate Domain JSON Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate all JSON files with Python
        run: |
          python3 -c "
          import json, os, sys
          errors = []
          for root, dirs, files in os.walk('domains'):
              for f in files:
                  if f.endswith('.json'):
                      path = os.path.join(root, f)
                      try:
                          json.load(open(path, encoding='utf-8'))
                      except json.JSONDecodeError as e:
                          errors.append(f'{path}: {e}')
          if errors:
              print('JSON validation failed:')
              for e in errors: print(e)
              sys.exit(1)
          total = sum(1 for r,d,fs in os.walk('domains') for f in fs if f.endswith('.json'))
          print(f'All {total} JSON files valid')
          "

  # ── HTML Validation ─────────────────────────────────────────────
  validate-html:
    name: Validate HTML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install html-validate
        run: npm install -g html-validate

      - name: Create html-validate config
        run: |
          echo '{"extends":["html-validate:recommended"],"rules":{"no-inline-style":"off","attribute-boolean-style":"off","void-style":"off","no-trailing-whitespace":"off"}}' > .htmlvalidate.json

      - name: Validate src/index.html
        run: html-validate src/index.html || true

  # ── JS Lint ─────────────────────────────────────────────────────
  lint-js:
    name: Lint JavaScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install ESLint
        run: npm install -g eslint@8

      - name: Create ESLint config
        run: |
          echo '{"env":{"browser":true,"es2022":true},"parserOptions":{"ecmaVersion":2022},"rules":{"no-undef":"warn","no-unused-vars":"warn"}}' > .eslintrc.json

      - name: Lint src/app.js
        run: eslint src/app.js || true

  # ── Lighthouse CI ───────────────────────────────────────────────
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: [validate-json, validate-html]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install serve and Lighthouse CI
        run: npm install -g @lhci/cli serve

      - name: Serve app locally
        run: serve . -p 3000 &

      - name: Wait for server
        run: sleep 5

      - name: Run Lighthouse CI
        run: |
          lhci autorun \
            --collect.url=http://localhost:3000/src/ \
            --collect.numberOfRuns=1 \
            --upload.target=temporary-public-storage
        continue-on-error: true

  # ── Summary ─────────────────────────────────────────────────────
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [validate-json, validate-html, lint-js, lighthouse]
    if: always()
    steps:
      - name: Report CI result
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| JSON Validation  | ${{ needs.validate-json.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| HTML Validation  | ${{ needs.validate-html.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| JS Lint          | ${{ needs.lint-js.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lighthouse CI    | ${{ needs.lighthouse.result }} |" >> $GITHUB_STEP_SUMMARY
