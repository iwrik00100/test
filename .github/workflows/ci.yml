name: CI — Validate & Quality Gates

on:
  pull_request:
    branches: [main, ver1.8]
  push:
    branches: [main, ver1.8]

jobs:

  # ── JSON Schema Validation ──────────────────────────────────────
  validate-json:
    name: Validate Domain JSON Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install AJV CLI
        run: npm install -g ajv-cli ajv-formats

      - name: Validate domain index files against schema
        run: |
          for f in domains/**/_index.json; do
            echo "Validating $f"
            ajv validate \
              -s schema/domain-index.schema.json \
              -d "$f" \
              --spec=draft7 \
              --strict=false
          done

      - name: Validate technology JSON files against schema
        run: |
          for f in domains/**/*.json; do
            # Skip _index.json files
            [[ "$(basename $f)" == "_index.json" ]] && continue
            echo "Validating $f"
            ajv validate \
              -s schema/technology.schema.json \
              -d "$f" \
              --spec=draft7 \
              --strict=false
          done

      - name: Count validated files
        run: |
          total=$(find domains -name "*.json" | wc -l)
          echo "✅ Validated $total JSON files"

  # ── HTML Validation ─────────────────────────────────────────────
  validate-html:
    name: Validate HTML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install html-validate
        run: npm install -g html-validate

      - name: Validate src/index.html
        run: html-validate src/index.html

  # ── JS Lint ─────────────────────────────────────────────────────
  lint-js:
    name: Lint JavaScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install ESLint
        run: npm install -g eslint

      - name: Lint src/app.js
        run: |
          eslint src/app.js \
            --env browser,es2022 \
            --rule '{"no-undef": "warn", "no-unused-vars": "warn"}' \
            --no-eslintrc \
            || true   # warn only — do not fail CI on lint warnings

  # ── Lighthouse CI ───────────────────────────────────────────────
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: [validate-json, validate-html]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install serve and Lighthouse CI
        run: npm install -g @lhci/cli serve

      - name: Serve app locally
        run: serve . -p 3000 &
        env:
          NODE_ENV: production

      - name: Wait for server
        run: sleep 3

      - name: Run Lighthouse CI
        run: |
          lhci autorun \
            --collect.url=http://localhost:3000/src/ \
            --collect.numberOfRuns=1 \
            --assert.preset=lighthouse:recommended \
            --assert.assertions.categories:performance=warn \
            --assert.assertions.categories:accessibility=error \
            --assert.assertions.categories:best-practices=warn \
            --assert.assertions.categories:seo=warn \
            --upload.target=temporary-public-storage
        continue-on-error: true

  # ── Summary ─────────────────────────────────────────────────────
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [validate-json, validate-html, lint-js, lighthouse]
    if: always()
    steps:
      - name: Report CI result
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| JSON Schema Validation | ${{ needs.validate-json.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| HTML Validation        | ${{ needs.validate-html.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| JS Lint                | ${{ needs.lint-js.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lighthouse CI          | ${{ needs.lighthouse.result }} |" >> $GITHUB_STEP_SUMMARY
