name: CI — Validate & Quality Gates

on:
  pull_request:
    branches: [main, ver1.8]
  push:
    branches: [main, ver1.8]

jobs:

  # ── JSON Schema Validation (ajv against technology.schema.json) ─
  validate-json:
    name: Validate Domain JSON Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - name: Install AJV CLI
        run: npm install -g ajv-cli ajv-formats

      - name: Validate domain index files against schema
        run: |
          for f in domains/**/_index.json; do
            echo "Validating $f"
            ajv validate \
              -s schema/domain-index.schema.json \
              -d "$f" \
              --spec=draft7 \
              --strict=false
          done

      - name: Validate technology JSON files against schema
        run: |
          for f in domains/**/*.json; do
            [[ "$(basename $f)" == "_index.json" ]] && continue
            echo "Validating $f"
            ajv validate \
              -s schema/technology.schema.json \
              -d "$f" \
              --spec=draft7 \
              --strict=false
          done

      - name: Count validated files
        run: |
          total=$(find domains -name "*.json" | wc -l)
          echo "✅ Validated $total JSON files against schema"

  # ── HTML Validation ─────────────────────────────────────────────
  validate-html:
    name: Validate HTML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - name: Install html-validate
        run: npm install -g html-validate

      - name: Create html-validate config
        run: |
          echo '{"extends":["html-validate:recommended"],"rules":{"void-style":"off","no-implicit-button-type":"off","autocomplete-password":"off","prefer-native-element":"off","no-inline-style":"off","attribute-boolean-style":"off","no-trailing-whitespace":"off"}}' > .htmlvalidate.json

      - name: Validate src/index.html
        run: html-validate src/index.html || true

  # ── JS Lint ─────────────────────────────────────────────────────
  lint-js:
    name: Lint JavaScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - name: Install ESLint
        run: npm install -g eslint@8

      - name: Create ESLint config
        run: |
          echo '{"env":{"browser":true,"es2022":true},"parserOptions":{"ecmaVersion":2022},"rules":{"no-undef":"warn","no-unused-vars":"warn"}}' > .eslintrc.json

      - name: Lint src/app.js
        run: eslint src/app.js || true

  # ── Test Stage (Vitest — ready for Phase 2) ─────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - name: Check for test files
        id: check_tests
        run: |
          if [ -f "package.json" ] && [ -d "tests" ]; then
            echo "has_tests=true" >> $GITHUB_OUTPUT
          else
            echo "has_tests=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No test suite yet — test stage scaffolded for Phase 2"
          fi

      - name: Run tests
        if: steps.check_tests.outputs.has_tests == 'true'
        run: npm test

  # ── Lighthouse CI ───────────────────────────────────────────────
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: [validate-json, validate-html]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - name: Install serve and Lighthouse CI
        run: npm install -g @lhci/cli serve

      - name: Serve app locally
        run: serve . -p 3000 &

      - name: Wait for server
        run: sleep 5

      - name: Run Lighthouse CI
        run: |
          lhci autorun \
            --collect.url=http://localhost:3000/src/ \
            --collect.numberOfRuns=1 \
            --upload.target=temporary-public-storage
        continue-on-error: true

  # ── Summary ─────────────────────────────────────────────────────
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [validate-json, validate-html, lint-js, test, lighthouse]
    if: always()
    steps:
      - name: Report CI result
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| JSON Schema Validation | ${{ needs.validate-json.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| HTML Validation        | ${{ needs.validate-html.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| JS Lint                | ${{ needs.lint-js.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests             | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lighthouse CI          | ${{ needs.lighthouse.result }} |" >> $GITHUB_STEP_SUMMARY
