apiVersion: apps/v1
kind: Deployment
metadata:
  name: netops-cockpit
  namespace: default
  labels:
    app: netops-cockpit
    version: "2.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: netops-cockpit
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0        # Zero-downtime rolling update
  template:
    metadata:
      labels:
        app: netops-cockpit
        version: "2.0"
    spec:
      containers:
        - name: netops-cockpit
          image: netops-cockpit:latest
          imagePullPolicy: IfNotPresent   # Use local image (minikube / Docker Desktop)
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /src/
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /src/
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: nginx-config
          configMap:
            name: netops-nginx-config
      # Spread pods across nodes for HA
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: netops-cockpit
