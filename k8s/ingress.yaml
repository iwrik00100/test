apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: netops-cockpit
  namespace: default
  labels:
    app: netops-cockpit
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - host: netops.local          # Add to hosts file: 127.0.0.1 netops.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: netops-cockpit
                port:
                  number: 80
